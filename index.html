<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draw Together</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --panel: rgba(255, 255, 255, 0.98);
            --border: #e2e8f0;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); overflow: hidden; }
        
        #lobby { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle at top left, #1e293b, #0f172a); }
        .card { background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 300px; }
        
        #game-container { display: none; width: 100%; height: 100%; }
        canvas { background: white; display: block; touch-action: none; cursor: crosshair; }

        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: var(--panel); padding: 8px;
            border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 10;
            align-items: center; border: 1px solid var(--border);
        }
        
        .btn {
            border: 1px solid transparent; background: transparent; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; transition: 0.2s; color: #475569;
        }
        .btn:hover { background: #f1f5f9; }
        .btn.active { background: var(--primary); color: white; }
        .btn svg { width: 20px; height: 20px; fill: currentColor; }

        .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
        
        input[type="range"] { width: 80px; accent-color: var(--primary); }
        #room-info { position: fixed; bottom: 15px; right: 15px; color: white; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px; font-size: 12px; backdrop-filter: blur(4px); }
        
        h2 { margin-top: 0; color: #1e293b; font-size: 22px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="card">
        <h2>CollabDraw</h2>
        <input type="text" id="roomInput" placeholder="Enter Room ID">
        <button id="joinBtn" class="btn" style="width:100%; background:var(--primary); color:white; height: 45px; font-weight: bold;">Join Workspace</button>
    </div>
</div>

<div id="game-container">
    <div class="toolbar">
        <button class="btn tool active" data-tool="pen" title="Pen">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
        <button class="btn tool" data-tool="rect" title="Rectangle">
            <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5z"/></svg>
        </button>
        <button class="btn tool" data-tool="circle" title="Circle">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </button>
        <button class="btn tool" data-tool="star" title="Star">
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </button>
        
        <div class="divider"></div>
        
        <input type="color" id="colorPicker" value="#6366f1" style="width:28px; height:28px; border:none; cursor:pointer; background:none;">
        <input type="range" id="sizeSlider" min="1" max="25" value="5">
        
        <div class="divider"></div>
        
        <button id="undoBtn" class="btn" title="Undo">
            <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
        </button>
        <button id="redoBtn" class="btn" title="Redo">
            <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
        </button>
        <button id="clearBtn" class="btn" title="Clear All" style="color:#ef4444">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
    </div>
    <canvas id="canvas"></canvas>
    <div id="room-info">Room: <span id="roomName"></span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8hO4NFiD4S1Qna2KMMqCkxjMMNZ560ls",
        authDomain: "draw-together-7110c.firebaseapp.com",
        databaseURL: "https://draw-together-7110c-default-rtdb.firebaseio.com",
        projectId: "draw-together-7110c",
        storageBucket: "draw-together-7110c.firebasestorage.app",
        messagingSenderId: "930035967438",
        appId: "1930035967438:web:e57ea55f4b7c0b3658379f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let currentRoom = "";
    let tool = "pen";
    let isDrawing = false;
    let startPos = { x: 0, y: 0 };
    let snapshot = null;
    
    let myActions = [];
    let redoStack = [];

    document.getElementById('joinBtn').onclick = () => {
        const val = document.getElementById('roomInput').value.trim().toLowerCase();
        if(!val) return alert("Please enter a Room ID");
        currentRoom = val;
        document.getElementById('roomName').innerText = val;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        resize();
        syncWithFirebase();
    };

    function resize() {
        const temp = ctx.getImageData(0,0, canvas.width, canvas.height);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.putImageData(temp, 0, 0);
    }

    function render(s) {
        if (!s) return;
        ctx.strokeStyle = s.color;
        ctx.fillStyle = s.color;
        ctx.lineWidth = s.size;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        if(s.type === 'pen') { ctx.moveTo(s.x0, s.y0); ctx.lineTo(s.x1, s.y1); ctx.stroke(); }
        else if(s.type === 'rect') { ctx.strokeRect(s.x0, s.y0, s.x1-s.x0, s.y1-s.y0); }
        else if(s.type === 'circle') { 
            let r = Math.sqrt(Math.pow(s.x1-s.x0, 2) + Math.pow(s.y1-s.y0, 2));
            ctx.arc(s.x0, s.y0, r, 0, Math.PI*2); ctx.stroke(); 
        }
        else if(s.type === 'star') {
            let r = Math.abs(s.x1-s.x0);
            for(let i=0; i<5; i++) {
                ctx.lineTo(s.x0 + r * Math.cos((18+72*i)*Math.PI/180), s.y0 - r * Math.sin((18+72*i)*Math.PI/180));
                ctx.lineTo(s.x0 + r/2 * Math.cos((54+72*i)*Math.PI/180), s.y0 - r/2 * Math.sin((54+72*i)*Math.PI/180));
            }
            ctx.closePath(); ctx.stroke();
        }
    }

    function syncWithFirebase() {
        const shapesRef = ref(db, `rooms/${currentRoom}/shapes`);
        onValue(shapesRef, (snapshot) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snapshot.forEach((child) => render(child.val()));
        });
    }

    const getPos = (e) => {
        const ev = e.touches ? e.touches[0] : e;
        return { x: ev.clientX, y: ev.clientY };
    };

    canvas.onmousedown = (e) => {
        isDrawing = true;
        startPos = getPos(e);
        snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    };

    window.onmousemove = (e) => {
        if(!isDrawing) return;
        const cur = getPos(e);
        const color = document.getElementById('colorPicker').value;
        const size = document.getElementById('sizeSlider').value;

        if(tool === 'pen') {
            const shape = { type:'pen', x0:startPos.x, y0:startPos.y, x1:cur.x, y1:cur.y, color, size };
            // Draw locally immediately for smoothness
            render(shape);
            // Push to Firebase
            const newRef = push(ref(db, `rooms/${currentRoom}/shapes`), shape);
            myActions.push(newRef.key);
            startPos = cur;
        } else {
            // Preview for shapes
            ctx.putImageData(snapshot, 0, 0);
            render({ type:tool, x0:startPos.x, y0:startPos.y, x1:cur.x, y1:cur.y, color, size });
        }
    };

    window.onmouseup = (e) => {
        if(!isDrawing) return;
        const cur = getPos(e);
        const color = document.getElementById('colorPicker').value;
        const size = document.getElementById('sizeSlider').value;

        if(tool !== 'pen') {
            const shape = { type:tool, x0:startPos.x, y0:startPos.y, x1:cur.x, y1:cur.y, color, size };
            const newRef = push(ref(db, `rooms/${currentRoom}/shapes`), shape);
            myActions.push(newRef.key);
        }
        isDrawing = false;
        redoStack = [];
    };

   
    document.querySelectorAll('.tool').forEach(b => {
        b.onclick = () => {
            const active = document.querySelector('.tool.active');
            if(active) active.classList.remove('active');
            b.classList.add('active');
            tool = b.dataset.tool;
        };
    });

    document.getElementById('undoBtn').onclick = () => {
        if(myActions.length === 0) return;
        const key = myActions.pop();
        onValue(ref(db, `rooms/${currentRoom}/shapes/${key}`), (s) => {
            if(s.exists()) redoStack.push({key, data: s.val()});
        }, {onlyOnce: true});
        remove(ref(db, `rooms/${currentRoom}/shapes/${key}`));
    };

    document.getElementById('redoBtn').onclick = () => {
        if(redoStack.length === 0) return;
        const item = redoStack.pop();
        set(ref(db, `rooms/${currentRoom}/shapes/${item.key}`), item.data);
        myActions.push(item.key);
    };

    document.getElementById('clearBtn').onclick = () => {
        if(confirm("This will clear the canvas for everyone! Continue?")) {
            remove(ref(db, `rooms/${currentRoom}/shapes`));
            myActions = [];
            redoStack = [];
        }
    };

    window.onresize = resize;
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.onmousedown(e); }, {passive: false});
    window.addEventListener('touchmove', (e) => { if(isDrawing) e.preventDefault(); window.onmousemove(e); }, {passive: false});
    window.addEventListener('touchend', (e) => { window.onmouseup(e); });
</script>
</body>
</html>
