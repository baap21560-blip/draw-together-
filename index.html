<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draw together</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.3);
            --bg: #0f172a; 
            --panel: rgba(255, 255, 255, 0.9); 
            --border: rgba(226, 232, 240, 0.8);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); overflow: hidden; position: fixed;
            user-select: none; -webkit-user-select: none;
        }

        #lobby { 
            display: flex; align-items: center; justify-content: center; height: 100vh; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            position: absolute; width: 100%; z-index: 2000; transition: 0.5s ease;
        }
        .card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 32px; text-align: center; 
            box-shadow: var(--shadow); width: 85%; max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1); color: white;
        }

        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        
        canvas { 
            background-color: #ffffff;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            display: block; touch-action: none;
        }

        
        .toolbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 8px; background: var(--panel); padding: 10px; 
            border-radius: 24px; box-shadow: var(--shadow); z-index: 100; 
            align-items: center; border: 1px solid var(--border); backdrop-filter: blur(15px);
            max-width: 95vw; pointer-events: auto;
        }
        
        .btn { 
            border: none; background: transparent; min-width: 44px; height: 44px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 16px; cursor: pointer; color: #475569; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.9); }
        .btn.active { background: var(--primary); color: white; }
        .btn svg { width: 20px; height: 20px; fill: currentColor; }
        
        .divider { width: 2px; height: 24px; background: rgba(0,0,0,0.08); margin: 0 4px; }
        
        input[type="color"] { 
            -webkit-appearance: none; border: 2px solid white; width: 30px; height: 30px; 
            border-radius: 50%; cursor: pointer; background: none; flex-shrink: 0;
        }

        .header-ui {
            position: fixed; top: 15px; left: 15px; z-index: 100;
        }
        .room-tag {
            background: var(--panel); padding: 8px 16px; border-radius: 12px;
            font-size: 14px; font-weight: 700; border: 1px solid var(--border);
        }

        #imgInput { display: none; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="card">
        <h2>CollabDraw <span style="color:var(--primary)">Pro</span></h2>
        <input type="text" id="roomInput" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:none;" placeholder="Room Name">
        <input type="password" id="adminKeyInput" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:none;" placeholder="Admin Key">
        <button id="joinBtn" style="width:100%; background:var(--primary); color:white; padding:16px; border-radius:12px; border:none; font-weight:700;">Start Drawing</button>
    </div>
</div>

<div id="game-container">
    <div class="header-ui">
        <div class="room-tag">Room: <span id="roomTitle" style="color:var(--primary)">General</span></div>
    </div>

    <div class="toolbar" id="mainToolbar">
        <button class="btn tool" data-tool="select" title="Move">
            <svg viewBox="0 0 24 24"><path d="M7 2l12 11.2l-5.8 0.5l3.3 7.3l-2.2 1l-3.2-7.4L7 18.5V2z"/></svg>
        </button>
        <button class="btn tool active" data-tool="pen" title="Pen">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
        </button>
        <button class="btn tool" data-tool="rect" title="Square">
            <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5z"/></svg>
        </button>
        
        <div class="divider"></div>
        <input type="color" id="colorPicker" value="#6366f1">
        <div class="divider"></div>
        
        <button id="undoBtn" class="btn"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
        
        <div id="adminTools" style="display:none; gap: 8px;">
            <div class="divider"></div>
            <input type="file" id="imgInput" accept="image/*">
            <button class="btn" onclick="document.getElementById('imgInput').click()" style="color: #059669;">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            </button>
            <button id="clearBtn" class="btn" style="color:#ef4444"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
        </div>
    </div>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8hO4NFiD4S1Qna2KMMqCkxjMMNZ560ls",
        authDomain: "draw-together-7110c.firebaseapp.com",
        databaseURL: "https://draw-together-7110c-default-rtdb.firebaseio.com",
        projectId: "draw-together-7110c",
        storageBucket: "draw-together-7110c.firebasestorage.app",
        messagingSenderId: "930035967438",
        appId: "1930035967438:web:e57ea55f4b7c0b3658379f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const toolbar = document.getElementById('mainToolbar');

    let currentRoom = "", isAdmin = false, tool = "pen", isDrawing = false;
    let selectedId = null, offset = { x: 0, y: 0 }, startPos = { x: 0, y: 0 };
    let shapes = {}, undoStack = [];
    const imageCache = {};

   
    ['touchstart', 'mousedown', 'click'].forEach(evt => {
        toolbar.addEventListener(evt, (e) => e.stopPropagation());
    });

    document.getElementById('joinBtn').onclick = () => {
        const room = document.getElementById('roomInput').value.trim() || "General";
        if(document.getElementById('adminKeyInput').value === "21560") {
            isAdmin = true;
            document.getElementById('adminTools').style.display = 'flex';
        }
        currentRoom = room;
        document.getElementById('roomTitle').innerText = room;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        resize();
        sync();
    };

    function resize() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        draw(); 
    }

    function sync() {
        onValue(ref(db, `rooms/${currentRoom}/shapes`), (snap) => {
            shapes = snap.val() || {};
            draw();
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        Object.keys(shapes).forEach(id => {
            const s = shapes[id];
            ctx.save();
            ctx.strokeStyle = s.color; ctx.fillStyle = s.color; ctx.lineWidth = 3;
            if (s.type === 'image') {
                if (imageCache[s.data]) ctx.drawImage(imageCache[s.data], s.x, s.y, s.w, s.h);
                else {
                    const img = new Image(); img.src = s.data;
                    img.onload = () => { imageCache[s.data] = img; draw(); };
                }
            } else if (s.type === 'rect') ctx.strokeRect(s.x, s.y, s.w, s.h);
            else if (s.type === 'pen') {
                ctx.lineCap = "round"; ctx.lineJoin = "round";
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x1, s.y1); ctx.stroke();
            }
            if (selectedId === id) {
                ctx.setLineDash([5, 5]); ctx.strokeStyle = "#6366f1";
                ctx.strokeRect(s.x-5, s.y-5, (s.w||(s.x1-s.x))+10, (s.h||(s.y1-s.y))+10);
            }
            ctx.restore();
        });
    }

    const getCoord = (e) => {
        const ev = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
    };

    const startAction = (e) => {
        if (e.target !== canvas) return; // CRITICAL: Only start if touching the canvas directly
        const m = getCoord(e);
        isDrawing = true; startPos = m;

        if (tool === 'select') {
            selectedId = null;
            Object.keys(shapes).reverse().forEach(id => {
                const s = shapes[id];
                const w = s.w || Math.abs(s.x1 - s.x);
                const h = s.h || Math.abs(s.y1 - s.y);
                if (m.x >= s.x && m.x <= s.x + w && m.y >= s.y && m.y <= s.y + h) {
                    if (!selectedId) { selectedId = id; offset = { x: m.x - s.x, y: m.y - s.y }; }
                }
            });
            draw();
        }
    };

    const moveAction = (e) => {
        if (!isDrawing) return;
        const m = getCoord(e);
        if (tool === 'select' && selectedId) {
            const s = shapes[selectedId];
            const updates = { x: m.x - offset.x, y: m.y - offset.y };
            if (s.type === 'pen') {
                updates.x1 = s.x1 + (updates.x - s.x);
                updates.y1 = s.y1 + (updates.y - s.y);
            }
            update(ref(db, `rooms/${currentRoom}/shapes/${selectedId}`), updates);
        } else if (tool === 'pen') {
            const data = { type: 'pen', x: startPos.x, y: startPos.y, x1: m.x, y1: m.y, color: document.getElementById('colorPicker').value };
            const newRef = push(ref(db, `rooms/${currentRoom}/shapes`), data);
            undoStack.push(newRef.key);
            startPos = m;
        }
    };

    const endAction = (e) => {
        if (!isDrawing) return;
        const m = getCoord(e.touches ? e.changedTouches[0] : e);
        if (tool === 'rect') {
            const data = { type: 'rect', x: Math.min(startPos.x, m.x), y: Math.min(startPos.y, m.y), w: Math.abs(m.x - startPos.x), h: Math.abs(m.y - startPos.y), color: document.getElementById('colorPicker').value };
            const newRef = push(ref(db, `rooms/${currentRoom}/shapes`), data);
            undoStack.push(newRef.key);
        }
        isDrawing = false;
    };

   
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e); }, {passive: false});
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); endAction(e); }, {passive: false});

    canvas.onmousedown = startAction;
    window.onmousemove = moveAction;
    window.onmouseup = endAction;

    document.getElementById('undoBtn').onclick = () => {
        const id = undoStack.pop();
        if (id) remove(ref(db, `rooms/${currentRoom}/shapes/${id}`));
    };

    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const data = { type: 'image', data: ev.target.result, x: 50, y: 50, w: img.width/4, h: img.height/4 };
                const newRef = push(ref(db, `rooms/${currentRoom}/shapes`), data);
                undoStack.push(newRef.key);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.querySelectorAll('.tool').forEach(b => b.onclick = () => {
        document.querySelector('.tool.active')?.classList.remove('active');
        b.classList.add('active'); tool = b.dataset.tool;
    });

    document.getElementById('clearBtn').onclick = () => {
        if(confirm("Clear All?")) remove(ref(db, `rooms/${currentRoom}/shapes`));
    };

    window.onresize = resize;
</script>
</body>
</html>
